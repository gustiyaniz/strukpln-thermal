<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PLN Thermal 56mm</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

</head>

<body>

<div class="app">

  <div class="topbar">
    <h1>PLN Thermal</h1>
    <p>Shopee Invoice → Thermal 56mm</p>
  </div>

  <div class="card">

    <label class="upload">

      <input
        type="file"
        id="pdfInput"
        accept=".pdf"
      >

      <div>
        <h3>Upload Screenshot</h3>
        <p>Shopee Invoice PLN</p>
      </div>

    </label>

    <button onclick="scanOCR()">
      Scan OCR
    </button>

    <img id="preview">

  </div>

  <div class="card">

    <h3>Data Struk</h3>

    <input type="text" id="toko"
    value="GARENG CELL">

    <input type="text" id="alamat"
    value="DESA SANGKANAYU RT 002/RW 001">

    <input type="text" id="idpel"
    placeholder="ID Pelanggan">

    <input type="text" id="meter"
    placeholder="No Meter">

    <input type="text" id="nama"
    placeholder="Nama">

    <input type="text" id="tarif"
    placeholder="Tarif / Daya">

    <input type="text" id="kwh"
    placeholder="Jumlah KWH">

    <textarea id="token"
    placeholder="Token PLN"></textarea>

    <input type="text" id="nominal"
    placeholder="Nominal">

    <input type="text" id="admin"
    placeholder="Admin">

    <input type="text" id="total"
    placeholder="Total">

    <button class="print"
    onclick="printReceipt()">

      Cetak Thermal 56mm

    </button>

  </div>

</div>

<div id="receipt">

  <div class="center big bold"
  id="rToko"></div>

  <div class="center"
  id="rAlamat"></div>

  <div class="double"></div>

  <div class="center title">
    STRUK PEMBELIAN TOKEN LISTRIK
  </div>

  <div class="double"></div>

  <div class="row">
    <span>TANGGAL</span>
    <span id="tanggal"></span>
  </div>

  <div class="row">
    <span>WAKTU</span>
    <span id="waktu"></span>
  </div>

  <div class="single"></div>

  <div class="row">
    <span>ID PEL</span>
    <span id="rIdpel"></span>
  </div>

  <div class="row">
    <span>NO METER</span>
    <span id="rMeter"></span>
  </div>

  <div class="row">
    <span>NAMA</span>
    <span id="rNama"></span>
  </div>

  <div class="row">
    <span>TARIF/DAYA</span>
    <span id="rTarif"></span>
  </div>

  <div class="row">
    <span>JML KWH</span>
    <span id="rKwh"></span>
  </div>

  <div class="single"></div>

  <div class="center token-title">
    TOKEN
  </div>

  <div class="token-box"
  id="rToken"></div>

  <div class="single"></div>

  <div class="row">
    <span>NOMINAL</span>
    <span id="rNominal"></span>
  </div>

  <div class="row">
    <span>ADMIN</span>
    <span id="rAdmin"></span>
  </div>

  <div class="double"></div>

  <div class="row total">
    <span>TOTAL</span>
    <span id="rTotal"></span>
  </div>

  <div class="double"></div>

</div>

<script src="script.js"></script>

</body>
</html>
